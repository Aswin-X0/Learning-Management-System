<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register | CourseRA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 1.5rem;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: #084298;
            box-shadow: 0 0 0 0.2rem rgba(8, 66, 152, 0.2);
        }

        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 600;
            background-color: #084298;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #052c65;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(8, 66, 152, 0.35);
        }

        .error {
            color: #b00020;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .bottom-links a {
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }

        .form-label {
            margin-bottom: 0.35rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-6">
            <div class="glass-card p-4 p-sm-5">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">CourseRA</h2>
                    <p class="text-muted mb-0">Create your account</p>
                </div>

                <div class="error" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/Coursera/signup}" th:object="${urequest}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Age</label>
                        <input type="number" th:field="*{age}" class="form-control" placeholder="Enter age" min="1" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Phone Number</label>
                        <input type="text" th:field="*{number}" class="form-control" placeholder="Enter phone number" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Choose username" required />
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Choose password" required />
                    </div>

                    <button type="submit" class="btn btn-primary w-100 shadow-sm">
                        Sign Up
                    </button>
                </form>

                <div class="bottom-links d-flex justify-content-between mt-4">
                    <a th:href="@{/Coursera/login}" class="text-primary">Already have an account?</a>
                    <a th:href="@{/Coursera/home}" class="text-secondary">Home</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
