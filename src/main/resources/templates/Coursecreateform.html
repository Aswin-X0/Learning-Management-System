<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Create Course | CourseRA</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@v1/web/uc-file-uploader-regular.min.css" />

    <style>
        body {
            background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-control,
        .form-select,
        textarea {
            background: rgba(255, 255, 255, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.7) !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1rem !important;
            box-shadow: none !important;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.8) !important;
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
        }

        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0a58ca;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-outline-secondary {
            border-radius: 0.75rem;
            font-weight: 600;
        }

        .file-info {
            margin-top: 14px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 1rem;
            display: none;
        }

        .file-info p {
            margin: 6px 0;
            font-size: 14px;
            word-break: break-word;
            color: #3f4752;
        }

        .upload-box {
            padding: 18px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .section-title {
            color: #0d6efd;
            font-weight: 700;
        }

        .text-soft {
            color: #5f6b7a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="glass-card p-4 p-sm-5">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                    <div>
                        <h2 class="section-title mb-1">Create Course</h2>
                        <p class="text-soft mb-0">Add a new course and upload media for your learners.</p>
                    </div>
                    <div>
                        <a th:href="@{/courses/list}" class="btn btn-outline-secondary me-2">Back</a>
                        <a th:href="@{/Coursera/home}" class="btn btn-outline-secondary">Home</a>
                    </div>
                </div>

                <form th:action="@{/courses/create}" th:object="${course}" method="post" id="courseForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Course Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Instructor</label>
                        <input type="text" th:field="*{instructor}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Description</label>
                        <textarea th:field="*{description}" rows="5" class="form-control" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Status</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="APPROVED">PUBLISHED</option>
                            <option value="REJECTED">ARCHIVED</option>
                        </select>
                    </div>

                    <div class="upload-box mb-4">
                        <label class="form-label fw-semibold text-secondary small mb-3 d-block">Upload Course Media</label>

                        <uc-config
                            ctx-name="courseUploader"
                            pubkey="3f69126955c560f931c0"
                            source-list="local,url,camera,gdrive,dropbox"
                            multiple="false">
                        </uc-config>

                        <uc-upload-ctx-provider
                            id="uploaderCtx"
                            ctx-name="courseUploader">
                        </uc-upload-ctx-provider>

                        <uc-file-uploader-regular
                            ctx-name="courseUploader">
                        </uc-file-uploader-regular>
                    </div>

                    <div class="file-info" id="fileInfoBox">
                        <p><strong>File Name:</strong> <span id="showFileName"></span></p>
                        <p><strong>Content Type:</strong> <span id="showContentType"></span></p>
                        <p><strong>File Size:</strong> <span id="showFileSize"></span></p>
                        <p><strong>File URL:</strong> <span id="showFileUrl"></span></p>
                    </div>

                    <input type="hidden" name="fileName" id="fileName">
                    <input type="hidden" name="contentType" id="contentType">
                    <input type="hidden" name="fileSize" id="fileSize">
                    <input type="hidden" name="fileUrl" id="fileUrl">

                    <div class="d-flex flex-column flex-md-row gap-3 mt-4">
                        <button type="submit" class="btn btn-primary flex-fill">Create Course</button>
                        <a th:href="@{/courses/list}" class="btn btn-outline-secondary flex-fill">Back to Course List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import * as UC from "https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@v1/web/uc-file-uploader-regular.min.js";
    UC.defineComponents(UC);

    const uploaderCtx = document.querySelector("#uploaderCtx");
    const form = document.querySelector("#courseForm");

    function fillHiddenFieldsFromUploader() {
        const api = uploaderCtx.getAPI();
        const state = { ...api.getOutputCollectionState() };

        console.log("Uploadcare state:", state);

        if (!state.successEntries || state.successEntries.length === 0) {
            document.getElementById("fileName").value = "";
            document.getElementById("contentType").value = "";
            document.getElementById("fileSize").value = "";
            document.getElementById("fileUrl").value = "";
            document.getElementById("fileInfoBox").style.display = "none";
            return false;
        }

        const file = state.successEntries[0];

        const fileName = file.name || "";
        const contentType = file.mimeType || "";
        const fileSize = file.size || "";
        const fileUrl = file.cdnUrl || (file.uuid ? `https://ucarecdn.com/${file.uuid}/` : "");

        document.getElementById("fileName").value = fileName;
        document.getElementById("contentType").value = contentType;
        document.getElementById("fileSize").value = fileSize;
        document.getElementById("fileUrl").value = fileUrl;

        document.getElementById("showFileName").textContent = fileName;
        document.getElementById("showContentType").textContent = contentType;
        document.getElementById("showFileSize").textContent = fileSize + " bytes";
        document.getElementById("showFileUrl").textContent = fileUrl;
        document.getElementById("fileInfoBox").style.display = "block";

        return true;
    }

    form.addEventListener("submit", function () {
        fillHiddenFieldsFromUploader();

        console.log("Submitting:");
        console.log("fileName =", document.getElementById("fileName").value);
        console.log("contentType =", document.getElementById("contentType").value);
        console.log("fileSize =", document.getElementById("fileSize").value);
        console.log("fileUrl =", document.getElementById("fileUrl").value);
    });

    document.querySelector("uc-file-uploader-regular")
        .addEventListener("change", function () {
            fillHiddenFieldsFromUploader();
        });
</script>

</body>
</html>
