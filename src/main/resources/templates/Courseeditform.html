<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<title>Edit Course | CourseRA</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.glass-card {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 1.5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.form-control,
.form-select {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
}

.form-control:focus,
.form-select:focus {
    background: rgba(255,255,255,0.8);
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.15);
}

.btn-primary {
    border-radius: 0.75rem;
    padding: 0.75rem;
    font-weight: 600;
    background-color: #0d6efd;
    border: none;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background-color: #0a58ca;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(13,110,253,0.3);
}

.bottom-links a {
    text-decoration: none;
    font-weight: 600;
}

.bottom-links a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-5">

<div class="glass-card p-4 p-sm-5">

<div class="text-center mb-4">
<h2 class="fw-bold text-primary">Edit Course</h2>
<p class="text-muted">Update course details</p>
</div>

<form th:action="@{/courses/edit/{name}(name=${course.name})}" th:object="${course}" method="post">

<div class="mb-3">
<label class="form-label fw-semibold text-secondary small">Course Name</label>
<input type="text" th:field="*{name}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label fw-semibold text-secondary small">Instructor</label>
<input type="text" th:field="*{instructor}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label fw-semibold text-secondary small">Description</label>
<textarea th:field="*{description}" rows="4" class="form-control" required></textarea>
</div>

<div class="mb-4">
<label class="form-label fw-semibold text-secondary small">Status</label>
<select th:field="*{status}" class="form-select">
<option value="APPROVED">PUBLISHED</option>
<option value="REJECTED">ARCHIVED</option>
</select>
</div>

<button type="submit" class="btn btn-primary w-100 shadow-sm">
Update Course
</button>

</form>

<div class="bottom-links d-flex justify-content-between mt-4">
<a th:href="@{/courses/list}" class="text-primary">Course List</a>
<a th:href="@{/Coursera/home}" class="text-secondary">Home</a>
</div>

</div>
</div>
</div>
</div>

</body>
</html>
