<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User List | CourseRA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .table {
      margin-bottom: 0;
    }

    .table thead {
      background: rgba(255, 255, 255, 0.6);
    }

    .table th {
      font-weight: 600;
    }

    .btn-custom {
      border-radius: 0.6rem;
      padding: 6px 14px;
    }

    .action-btn {
      text-decoration: none;
      font-weight: 600;
    }

    .action-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="glass-card p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold text-primary">Users</h2>

        <div>
          <a class="btn btn-primary btn-custom me-2" th:href="@{/Coursera/signup}">
            Register
          </a>

          <a class="btn btn-outline-primary btn-custom" th:href="@{/Coursera/home}">
            Home
          </a>
        </div>

      </div>

      <div class="table-responsive">

        <table class="table table-hover align-middle">

          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Age</th>
              <th>Number</th>
              <th>Email</th>
              <th>Username</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr th:if="${users == null or #lists.isEmpty(users)}">
              <td colspan="7" class="text-center text-muted">
                No users found.
              </td>
            </tr>

            <tr th:each="u : ${users}">

              <td th:text="${u.id}">1</td>
              <td th:text="${u.name}">Name</td>
              <td th:text="${u.age}">20</td>
              <td th:text="${u.number}">9999999999</td>
              <td th:text="${u.email}">email@test.com</td>
              <td th:text="${u.username}">username</td>

              <td>

                <a class="action-btn text-primary" th:href="@{/Coursera/useredit/{username}(username=${u.username})}">
                  Edit
                </a>

                <span class="mx-2">|</span>

                <a class="action-btn text-danger" th:href="@{/Coursera/deleteuser/{id}(id=${u.id})}"
                  onclick="return confirm('Delete this user?')">
                  Delete
                </a>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</body>

</html>
