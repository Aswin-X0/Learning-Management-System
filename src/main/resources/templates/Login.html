<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CourseRA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0a58ca;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .divider:before,
        .divider:after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(13, 110, 253, 0.2);
        }

        .error {
            color: #b00020;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .bottom-links a {
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="glass-card p-4 p-sm-5">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">CourseRA</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <div class="error" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/Coursera/login}" method="post">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required />
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required />
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-4 shadow-sm">
                        Login to Dashboard
                    </button>
                </form>

                <div class="divider d-flex align-items-center my-4">
                    <p class="text-center fw-bold mx-3 mb-0 text-muted small text-uppercase">OR</p>
                </div>

                <div class="bottom-links d-flex justify-content-between mt-3">
                    <a th:href="@{/Coursera/signup}" class="text-primary">Create new account</a>
                    <a th:href="@{/Coursera/home}" class="text-secondary">Home</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
