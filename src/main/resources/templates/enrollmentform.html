<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Enrollment</title>
</head>
<body>
    <h2>Enroll User in Course</h2>

    <form th:action="@{/enrollments/add}" th:object="${erequest}" method="post">
    <label>User:</label>
    <select th:field="*{userId}">
        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
    </select>

    <label>Course:</label>
    <select th:field="*{courseId}">
        <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.name}"></option>
    </select>

    <button type="submit">Enroll</button>
</form>
</body>
</html>
