<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Course List | CourseRA</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top left, #8eb2e8 40%, #c6e5ef 60%, #c5ecf7 90%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0a58ca;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-outline-primary,
        .btn-outline-danger,
        .btn-outline-secondary {
            border-radius: 0.75rem;
            font-weight: 600;
        }

        .carousel-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px 4px 6px;
            scroll-behavior: smooth;
        }

        .carousel-container::-webkit-scrollbar {
            height: 10px;
        }

        .carousel-container::-webkit-scrollbar-thumb {
            background: rgba(13, 110, 253, 0.35);
            border-radius: 10px;
        }

        .course-card {
            min-width: 340px;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 1.25rem;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
        }

        .course-card h3 {
            color: #0d6efd;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .course-card p {
            color: #3f4752;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(13, 110, 253, 0.12);
            color: #0d6efd;
            margin-top: 6px;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .empty-message {
            text-align: center;
            color: #5f6b7a;
            font-size: 1.05rem;
            padding: 20px 0 10px;
        }

        .media-preview {
            margin-bottom: 15px;
        }

        .media-preview img,
        .media-preview video {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 1rem;
            background: #eef3f9;
        }

        .media-placeholder {
            width: 100%;
            height: 190px;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #617086;
            font-weight: 600;
            border: 1px dashed rgba(13, 110, 253, 0.25);
        }

        .audio-box,
        .pdf-box {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 1rem;
            text-align: center;
            color: #3f4752;
            box-sizing: border-box;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .top-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            body {
                padding: 24px 12px;
            }

            .course-card {
                min-width: 290px;
                max-width: 290px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card p-4 p-sm-5">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <div>
                <h2 class="fw-bold text-primary mb-1">All Courses</h2>
                <p class="text-muted mb-0">Browse and manage your CourseRA catalog</p>
            </div>

            <div class="top-actions">
                <a class="btn btn-primary" th:href="@{/courses/create}">Create New Course</a>
                <a class="btn btn-outline-secondary" th:href="@{/Coursera/home}">Home</a>
            </div>
        </div>

        <div class="glass-card p-4 mb-4">
            <h4 class="fw-bold text-primary mb-3">Search Course</h4>

            <form action="/courses/search/name" method="get" class="row g-3 align-items-center mb-3">
                <div class="col-md-8">
                    <input type="text" name="name" class="form-control" placeholder="Search by course name">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Search by Name</button>
                </div>
            </form>

            <form action="/courses/search/instructor" method="get" class="row g-3 align-items-center">
                <div class="col-md-8">
                    <input type="text" name="instructor" class="form-control" placeholder="Search by instructor">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Search by Instructor</button>
                </div>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(courses)}" class="empty-message">
            No courses found.
        </div>

        <div th:if="${!#lists.isEmpty(courses)}" class="carousel-container">
            <div class="course-card" th:each="course : ${courses}">

                <div class="media-preview">
                    <div th:if="${courseMediaMap[course.id] == null}" class="media-placeholder">
                        No Media
                    </div>

                    <img th:if="${courseMediaMap[course.id] != null and courseMediaMap[course.id].mediaType == 'IMAGE'}"
                         th:src="${courseMediaMap[course.id].fileUrl}"
                         alt="Course Image">

                    <video controls
                           th:if="${courseMediaMap[course.id] != null and courseMediaMap[course.id].mediaType == 'VIDEO'}">
                        <source th:src="${courseMediaMap[course.id].fileUrl}">
                    </video>

                    <div th:if="${courseMediaMap[course.id] != null and courseMediaMap[course.id].mediaType == 'PDF'}"
                         class="pdf-box">
                        <div class="fw-semibold mb-2">PDF File Available</div>
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="${courseMediaMap[course.id].fileUrl}"
                           target="_blank">Open PDF</a>
                    </div>

                    <div th:if="${courseMediaMap[course.id] != null and courseMediaMap[course.id].mediaType == 'AUDIO'}"
                         class="audio-box">
                        <div class="fw-semibold mb-2">Audio File Available</div>
                        <audio controls>
                            <source th:src="${courseMediaMap[course.id].fileUrl}">
                        </audio>
                    </div>
                </div>

                <h3 th:text="${course.name}">Course Name</h3>
                <p><strong>Instructor:</strong> <span th:text="${course.instructor}"></span></p>
                <p><strong>Description:</strong> <span th:text="${course.description}"></span></p>
                <span class="status" th:text="${course.status}">DRAFT</span>

                <div class="actions">
                    <a class="btn btn-outline-primary btn-sm"
                       th:href="@{/courses/edit/{name}(name=${course.name})}">Edit</a>

                    <a class="btn btn-outline-danger btn-sm"
                       th:href="@{/courses/delete/{name}(name=${course.name})}">Delete</a>

                    <a class="btn btn-outline-secondary btn-sm"
                       th:if="${courseMediaMap[course.id] != null}"
                       th:href="${courseMediaMap[course.id].fileUrl}"
                       target="_blank">
                        Open Media
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
